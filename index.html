<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BioDigitalSim Web - Mobile</title>
<style>
    body { 
        margin:0; 
        background:#05050a; 
        overflow:hidden; 
        touch-action: none; /* Prevents default browser pull-to-refresh */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas { display:block; }
    
    #ui {
        position:fixed;
        top:10px;
        left:10px;
        color:rgba(255,255,255,0.9);
        font-family:monospace;
        background:rgba(0,0,0,0.6);
        padding:12px;
        border-radius:8px;
        pointer-events: none;
        font-size: 14px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: grid;
        grid-template-columns: repeat(2, 60px);
        gap: 10px;
    }

    button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        font-size: 18px;
        font-weight: bold;
        backdrop-filter: blur(5px);
        -webkit-tap-highlight-color: transparent;
    }

    button:active {
        background: rgba(255, 255, 255, 0.4);
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui"></div>

<div class="controls">
    <button onclick="changeDim(1)">D+</button>
    <button onclick="changeDim(-1)">D-</button>
    <button onclick="changeConst(1)">C+</button>
    <button onclick="changeConst(-1)">C-</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * window.devicePixelRatio;
    canvas.height = height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener("resize", resize);
resize();

// --- State ---
let currentDim = 8;
let currentIdx = 0;
let rotationAngle = 0;
let colorShift = 0;
let zoom = 1;

const physicsTable = [
    {name:"Pi", value:Math.PI},
    {name:"Electron g", value:2.0023193},
    {name:"Planck", value:6.6260701},
    {name:"Speed of Light", value:299792458}
];

let vertices = [];

function initHypercube(dim) {
    vertices = [];
    let numVertices = 1 << dim;
    for (let i = 0; i < numVertices; i++) {
        let coords = [];
        let n = i, count = 0;
        while (n > 0) { n &= (n - 1); count++; }
        for (let j = 0; j < dim; j++) {
            coords.push((i & (1 << j)) ? 1 : -1);
        }
        vertices.push({ id: i, coords: coords, hammingWeight: count });
    }
}

// Global functions for buttons
window.changeDim = (amt) => {
    currentDim = Math.max(1, Math.min(13, currentDim + amt)); // Capped at 13 for mobile performance
    initHypercube(currentDim);
};

window.changeConst = (amt) => {
    currentIdx = (currentIdx + amt + physicsTable.length) % physicsTable.length;
};

initHypercube(currentDim);

// --- Touch Handling ---
let initialDist = null;
let lastTouchY = null;

canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 2) {
        initialDist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
    }
}, { passive: false });

canvas.addEventListener("touchmove", e => {
    if (e.touches.length === 2 && initialDist) {
        let currentDist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        zoom *= (currentDist / initialDist);
        initialDist = currentDist;
    } else if (e.touches.length === 1) {
        // Drag up/down to speed up rotation
        rotationAngle += 0.01; 
    }
    e.preventDefault();
}, { passive: false });

// Desktop support preserved
window.addEventListener("wheel", e => { zoom *= (e.deltaY < 0) ? 1.1 : 0.9; });

function loop() {
    rotationAngle += 0.005;
    colorShift += 0.003;

    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, width, height);

    const centerX = width / 2;
    const centerY = height / 2;
    const baseScale = (Math.min(width, height) / (currentDim + 3)) * 1.2 * zoom;
    const activeWarp = physicsTable[currentIdx].value;

    let proj = [];
    for (let v of vertices) {
        let px = 0, py = 0;
        for (let j = 0; j < currentDim; j++) {
            let angle = (2 * activeWarp * j / currentDim) + rotationAngle;
            px += v.coords[j] * Math.cos(angle);
            py += v.coords[j] * Math.sin(angle);
        }
        proj.push({ x: px * baseScale + centerX, y: py * baseScale + centerY });
    }

    if (currentDim <= 8) { // Performance check for mobile
        ctx.strokeStyle = "rgba(100,100,255,0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let v of vertices) {
            for (let j = 0; j < currentDim; j++) {
                let neighbor = v.id ^ (1 << j);
                if (neighbor > v.id) {
                    ctx.moveTo(proj[v.id].x, proj[v.id].y);
                    ctx.lineTo(proj[neighbor].x, proj[neighbor].y);
                }
            }
        }
        ctx.stroke();
    }

    let size = currentDim > 10 ? 1.5 : 3.5;
    for (let i = 0; i < vertices.length; i++) {
        let v = vertices[i];
        let t = v.hammingWeight / currentDim;
        let r = 127 * (1 + Math.cos(2 * Math.PI * (t + colorShift)));
        let g = 127 * (1 + Math.cos(2 * Math.PI * (t + 0.33 + colorShift)));
        let b = 127 * (1 + Math.cos(2 * Math.PI * (t + 0.66 + colorShift)));

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(proj[i].x - size/2, proj[i].y - size/2, size, size);
    }

    document.getElementById("ui").innerHTML = `
        DIM: ${currentDim}<br>
        Constant: ${physicsTable[currentIdx].name}<br>
        Value: ${physicsTable[currentIdx].value.toFixed(4)}
    `;

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
