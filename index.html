<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BioDigitalSim Web - Mobile</title>

<style>
body { 
    margin:0; 
    background:#05050a; 
    overflow:hidden; 
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
canvas { display:block; }

#ui {
    position:fixed;
    top:10px;
    left:10px;
    color:rgba(255,255,255,0.9);
    font-family:monospace;
    background:rgba(0,0,0,0.6);
    padding:12px;
    border-radius:8px;
    pointer-events: none;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="ui"></div>

<script>
// --- Canvas ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * window.devicePixelRatio;
    canvas.height = height * window.devicePixelRatio;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener("resize", resize);
resize();

// --- State ---
let currentDim = 8;
let currentIdx = 0;
let rotationAngle = 0;
let colorShift = 0;
let zoom = 1;

let offsetX = 0;
let offsetY = 0;

const physicsTable = [
    {name:"Pi", value:Math.PI},
    {name:"Electron g", value:2.0023193},
    {name:"Planck", value:6.6260701},
    {name:"Speed of Light", value:299792458}
];

let vertices = [];

function initHypercube(dim) {
    vertices = [];
    let numVertices = 1 << dim;

    for (let i = 0; i < numVertices; i++) {
        let coords = [];
        let n = i, count = 0;

        while (n > 0) { n &= (n - 1); count++; }

        for (let j = 0; j < dim; j++) {
            coords.push((i & (1 << j)) ? 1 : -1);
        }

        vertices.push({ id: i, coords, hammingWeight: count });
    }
}

function changeDim(amt) {
    currentDim = Math.max(1, Math.min(13, currentDim + amt));
    initHypercube(currentDim);
}

function changeConst(amt) {
    currentIdx = (currentIdx + amt + physicsTable.length) % physicsTable.length;
}

initHypercube(currentDim);

// --- Touch Controls ---
let touchMode = null;
let startY = 0;
let startX = 0;

let initialDist = null;
let lastMidX = 0;
let lastMidY = 0;

canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
        let t = e.touches[0];
        startY = t.clientY;
        startX = t.clientX;

        touchMode = (t.clientX < width / 2) ? "dim" : "const";

    } else if (e.touches.length === 2) {
        touchMode = "pinch";

        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        initialDist = Math.hypot(dx, dy);

        lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }

}, { passive: false });

canvas.addEventListener("touchmove", e => {
    if (touchMode === "pinch" && e.touches.length === 2) {
        // Zoom
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.hypot(dx, dy);

        zoom *= (dist / initialDist);
        initialDist = dist;

        // Pan
        let midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        let midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        offsetX += (midX - lastMidX);
        offsetY += (midY - lastMidY);

        lastMidX = midX;
        lastMidY = midY;

    } else if (e.touches.length === 1) {
        let t = e.touches[0];
        let deltaY = t.clientY - startY;

        if (Math.abs(deltaY) > 25) {
            if (touchMode === "dim") {
                changeDim(deltaY < 0 ? 1 : -1);
            } else {
                changeConst(deltaY < 0 ? 1 : -1);
            }
            startY = t.clientY;
        }
    }

    e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", () => {
    touchMode = null;
    initialDist = null;
});

// Desktop zoom
window.addEventListener("wheel", e => {
    zoom *= (e.deltaY < 0) ? 1.1 : 0.9;
});

// --- Render Loop ---
function loop() {
    rotationAngle += 0.005;
    colorShift += 0.003;

    zoom = Math.max(0.2, Math.min(zoom, 10));

    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, width, height);

    const centerX = width / 2 + offsetX;
    const centerY = height / 2 + offsetY;

    const baseScale = (Math.min(width, height) / (currentDim + 3)) * 1.2 * zoom;
    const activeWarp = physicsTable[currentIdx].value;

    let proj = [];

    for (let v of vertices) {
        let px = 0, py = 0;

        for (let j = 0; j < currentDim; j++) {
            let angle = (2 * activeWarp * j / currentDim) + rotationAngle;
            px += v.coords[j] * Math.cos(angle);
            py += v.coords[j] * Math.sin(angle);
        }

        proj.push({
            x: px * baseScale + centerX,
            y: py * baseScale + centerY
        });
    }

    if (currentDim <= 8) {
        ctx.strokeStyle = "rgba(100,100,255,0.15)";
        ctx.beginPath();

        for (let v of vertices) {
            for (let j = 0; j < currentDim; j++) {
                let n = v.id ^ (1 << j);
                if (n > v.id) {
                    ctx.moveTo(proj[v.id].x, proj[v.id].y);
                    ctx.lineTo(proj[n].x, proj[n].y);
                }
            }
        }
        ctx.stroke();
    }

    let size = currentDim > 10 ? 1.5 : 3.5;

    for (let i = 0; i < vertices.length; i++) {
        let v = vertices[i];
        let t = v.hammingWeight / currentDim;

        let r = 127 * (1 + Math.cos(2 * Math.PI * (t + colorShift)));
        let g = 127 * (1 + Math.cos(2 * Math.PI * (t + 0.33 + colorShift)));
        let b = 127 * (1 + Math.cos(2 * Math.PI * (t + 0.66 + colorShift)));

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(proj[i].x - size/2, proj[i].y - size/2, size, size);
    }

    document.getElementById("ui").innerHTML = `
        DIM: ${currentDim}<br>
        Constant: ${physicsTable[currentIdx].name}<br>
        Value: ${physicsTable[currentIdx].value.toFixed(4)}
    `;

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
